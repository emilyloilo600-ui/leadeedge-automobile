<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us // LEADEEDGE Automobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .contact-box {
            background-color: #11141a;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 15px;
            font-weight: 900;
        }

        p {
            color: #c5c6c7;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Clickable phone link styling */
        .phone-link {
            display: inline-block;
            font-size: 1.8rem;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            background-color: #1f2833;
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid #d4af37;
            margin-bottom: 40px;
            transition: 0.3s ease;
        }

        .phone-link:hover {
            background-color: #d4af37;
            color: #0b0c10;
            transform: scale(1.03);
        }

        .back-btn {
            color: #c5c6c7;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="contact-box">
        <h1>Contact Our Office</h1>
        <p>Click the number below to open your device's dialer and call LEADEEDGE Automobile directly:</p>

        <!-- The tel: link system handles mobile and system dialing protocols -->
        <a href="tel:+2349112311051" class="phone-link">📞 +234 911 231 1051</a>

        <br>
        <a href="index.html" class="back-btn">← Back to Showroom</a>
    </div>

</body>
</html>
